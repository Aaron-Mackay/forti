name: Migrate Database

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target database environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      migration_name:
        description: 'Migration name (dev only — auto-generated from timestamp if blank)'
        required: false
        type: string
      confirm_migrate:
        description: >-
          I understand this will apply schema migrations to the target database
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  migrate:
    name: Migrate ${{ github.event.inputs.environment }} database
    runs-on: ubuntu-latest

    steps:
      - name: Require confirmation
        if: ${{ github.event.inputs.confirm_migrate != 'true' }}
        run: |
          echo "❌ You must tick 'confirm_migrate' to proceed. Aborting."
          exit 1

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Migrate dev database
        if: ${{ github.event.inputs.environment == 'dev' }}
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: |
          NAME="${{ github.event.inputs.migration_name }}"
          if [ -z "$NAME" ]; then
            NAME="migration_$(date +%Y%m%d%H%M%S)"
          fi
          # Reset clears any drift and re-applies all existing migrations cleanly
          npx prisma migrate reset --force
          # Non-interactively generate a migration file for any schema changes
          # (prisma migrate dev requires interactive confirmation for destructive changes)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          MIGRATION_DIR="prisma/migrations/${TIMESTAMP}_${NAME}"
          mkdir -p "$MIGRATION_DIR"
          npx prisma migrate diff \
            --from-config-datasource \
            --to-schema=prisma/schema.prisma \
            --script > "$MIGRATION_DIR/migration.sql"
          if grep -qvE "^(--|[[:space:]]*$)" "$MIGRATION_DIR/migration.sql"; then
            echo "Schema changes detected — applying migration."
            npx prisma migrate deploy
          else
            echo "No schema changes — removing empty migration directory."
            rm -rf "$MIGRATION_DIR"
          fi
          npx prisma generate

      - name: Commit generated migration
        if: ${{ github.event.inputs.environment == 'dev' }}
        env:
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain prisma/migrations)" ]; then
            git add prisma/migrations
            git commit -m "chore: add migration ${{ github.event.inputs.migration_name || 'auto' }}"
            git push
          else
            echo "No new migration files — schema already covered by existing migrations."
          fi

      - name: Seed dev database
        if: ${{ github.event.inputs.environment == 'dev' }}
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: npm run seed

      - name: Migrate prod database
        if: ${{ github.event.inputs.environment == 'prod' }}
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npx prisma migrate deploy
