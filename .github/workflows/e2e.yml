name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      checks: write
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forti_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/forti_test
      # Set NEXTAUTH_SECRET in your repo's GitHub Actions secrets.
      # Falls back to a CI-only value if the secret is not configured.
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-e2e-secret-not-for-production' }}
      NEXTAUTH_URL: http://localhost:3000
      # Google OAuth is not exercised by E2E tests (demo login is used instead).
      GOOGLE_CLIENT_ID: ci-dummy-client-id
      GOOGLE_CLIENT_SECRET: ci-dummy-client-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: npx prisma db push

      - name: Seed database
        run: npm run seed

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build Next.js app
        # Use a production build so Next.js serves routes via webpack, not
        # Turbopack. Turbopack has a known issue in Next.js 16 where the
        # [...nextauth] catch-all API route returns 404 in dev mode, causing
        # every E2E test to fail at the auth-setup step.
        run: npm run build

      - name: Run E2E tests
        run: npx start-server-and-test start http://localhost:3000 'npx playwright test'

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright E2E Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
