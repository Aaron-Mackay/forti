name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (shard ${{ matrix.shard }}/6)
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    permissions:
      checks: write
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forti_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/forti_test
      # Set NEXTAUTH_SECRET in your repo's GitHub Actions secrets.
      # Falls back to a CI-only value if the secret is not configured.
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-e2e-secret-not-for-production' }}
      NEXTAUTH_URL: http://localhost:3000
      # Google OAuth is not exercised by E2E tests (demo login is used instead).
      GOOGLE_CLIENT_ID: ci-dummy-client-id
      GOOGLE_CLIENT_SECRET: ci-dummy-client-secret
      ENABLE_TEST_AUTH: 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: npm exec -w @forti/web -- prisma db push

      - name: Seed database
        run: npm run seed

      - name: Get Playwright version
        id: playwright-version
        run: |
          VERSION=$(node -p "require('./apps/web/package.json').devDependencies['@playwright/test']")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-all-browsers

      - name: Install Playwright system dependencies
        run: npm exec -w @forti/web -- playwright install-deps

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npm exec -w @forti/web -- playwright install

      - name: Build Next.js app
        # Use a production build so Next.js serves routes via webpack, not
        # Turbopack. Turbopack has a known issue in Next.js 16 where the
        # [...nextauth] catch-all API route returns 404 in dev mode, causing
        # every E2E test to fail at the auth-setup step.
        run: npm run build

      - name: Run E2E tests
        working-directory: apps/web
        env:
          PLAYWRIGHT_SHARD: ${{ matrix.shard }}/6
        run: npx start-server-and-test start http://localhost:3000 'npx playwright test --shard=${{ matrix.shard }}/6'

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Playwright E2E Results (shard ${{ matrix.shard }}/6)
          path: apps/web/test-results/junit.xml
          reporter: java-junit
          fail-on-error: 'false'

      - name: Ensure agent failure summary exists
        if: always()
        run: |
          mkdir -p apps/web/test-results
          if [ ! -f apps/web/test-results/agent-failures.txt ]; then
            cat > apps/web/test-results/agent-failures.txt <<'EOF'
            # Playwright E2E Agent Failure Context

            No Playwright agent failure summary was produced.
            The test runner may not have started, or failure happened before Playwright executed.
            EOF
          fi

      - name: Upload Playwright agent failure summary
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-agent-failures-shard-${{ matrix.shard }}
          path: apps/web/test-results/agent-failures.txt
          retention-days: 7

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Playwright test artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-test-results-shard-${{ matrix.shard }}
          path: apps/web/test-results/
          retention-days: 7
  agent-failure-summary:
    name: Combine Playwright agent failure summaries
    runs-on: ubuntu-latest
    needs: e2e
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    permissions:
      contents: read

    steps:
      - name: Download shard summaries
        uses: actions/download-artifact@v7
        with:
          pattern: playwright-agent-failures-shard-*
          path: agent-failures
          merge-multiple: false

      - name: Combine summaries
        run: |
          {
            echo "# Combined Playwright E2E Agent Failure Context"
            echo
            echo "Paste this file directly into a coding agent."
            echo "This summary deliberately excludes screenshots, videos, traces, artifact paths, and other external files."
            echo
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "Commit: $GITHUB_SHA"
            echo "Ref: $GITHUB_REF"
            echo "Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo

            found_any=false

            while IFS= read -r file; do
              found_any=true
              shard_name="$(basename "$(dirname "$file")")"

              echo "---"
              echo
              echo "# $shard_name"
              echo
              cat "$file"
              echo
              echo
            done < <(find agent-failures -name 'agent-failures.txt' -print | sort -V)

            if [ "$found_any" = false ]; then
              echo "No shard failure summaries were downloaded."
              echo
              echo "This usually means the E2E job did not reach the summary upload step."
            fi
          } > playwright-agent-failures.txt

      - name: Upload combined agent failure summary
        uses: actions/upload-artifact@v7
        with:
          name: playwright-agent-failures
          path: playwright-agent-failures.txt
          retention-days: 7
