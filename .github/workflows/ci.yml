name: CI

on:
  push:
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Test, Lint & Build
    runs-on: ubuntu-latest

    env:
      # Next.js build compiles but does not query the DB for dynamic routes.
      # A dummy URL is sufficient here; unit tests mock all DB access.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/forti_ci
      NEXTAUTH_SECRET: ci-build-secret-not-used-in-production
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-dummy-client-id
      GOOGLE_CLIENT_SECRET: ci-dummy-client-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
