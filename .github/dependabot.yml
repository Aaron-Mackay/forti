version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"

      - dependency-name: "eslint-*"
        update-types:
          - "version-update:semver-major"

      - dependency-name: "@mui/*"
        update-types:
          - "version-update:semver-major"
